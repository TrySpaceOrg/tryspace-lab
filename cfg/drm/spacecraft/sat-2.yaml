spacecraft_name: "sat-2"
spacecraft_id: 2
components:
  - name: "adcs"
  - name: "eps"
  - name: "radio"

# Specific configuration
adcs:
  string: "/dev/usart_3"
  handle: 3
  baudrate_hz: 115200
  ms_timeout: 250

eps:
  i2c_bus_id: 0
  i2c_device_addr: 0x1F
  i2c_speed: 400000
  ms_timeout: 250

radio:
  spi_bus: 1
  spi_cs: 1
  gpio_power_pin: 12
  gpio_interrupt_pin: 13

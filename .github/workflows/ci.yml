name: CI

on:
  pull_request:
    branches:
      - '**'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install GNU Make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Build Container
        run: |
          make container

  build-simulith:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Build Simulith
        run: |
          make sim

  build-fsw:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Build FSW
        run: |
            make fsw

  build-gsw:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Build GSW
        run: |
          make gsw

  build-cli:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Build CLI
        run: |
          make cli
